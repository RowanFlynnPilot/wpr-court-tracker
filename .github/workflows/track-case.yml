name: Track-a-case intake

# Reporters file a "Track a case" issue form; this turns it into a
# sign-off PR. The issue body is untrusted (public repo): it is passed to
# the parser via env (never shell-interpolated) and validated by
# pipeline/issue_case.py before anything is staged. Merging the PR is the
# editorial sign-off and publishes within minutes.

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: track-case-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  intake:
    if: contains(github.event.issue.labels.*.name, 'track-a-case')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build and validate the case entry
        id: parse
        continue-on-error: true
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python pipeline/issue_case.py 2> err.txt

      - name: Explain a rejected form on the issue
        if: steps.parse.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NO: ${{ github.event.issue.number }}
        run: |
          {
            echo "This request can't go on the tracker yet:"
            echo
            echo '```'
            cat err.txt
            echo '```'
            echo
            echo "Edit this issue's description to fix it — it re-checks automatically."
          } > comment.md
          gh issue comment "$ISSUE_NO" --body-file comment.md
          exit 1

      - name: Open the sign-off PR
        if: steps.parse.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NO: ${{ github.event.issue.number }}
        run: |
          CASE_NO=$(python -c "import json; print(json.load(open('out/new_case.json'))['caseNo'])")
          HEADLINE=$(python -c "import json; print(json.load(open('out/new_case.json'))['headline'])")
          BRANCH="case/issue-$ISSUE_NO"
          git config user.name "wpr-court-tracker"
          git config user.email "actions@github.com"
          git checkout -b "$BRANCH"
          git add config/cases.json
          git commit -m "Track $CASE_NO: $HEADLINE" -m "From track-a-case issue #$ISSUE_NO."
          git push -f origin "HEAD:$BRANCH"
          printf '%s\n' \
            "Adds this case to the public watchlist from issue #$ISSUE_NO." \
            "" \
            "Passed the editorial policy gate (case type allowed, dates valid, not already tracked). **Merging is the publisher sign-off** — the case publishes within minutes." \
            "" \
            "Closes #$ISSUE_NO" > pr-body.md
          PR_URL=$(gh pr list --head "$BRANCH" --json url --jq '.[0].url')
          if [ -z "$PR_URL" ]; then
            PR_URL=$(gh pr create --head "$BRANCH" \
              --title "Track $CASE_NO: $HEADLINE" --body-file pr-body.md)
          fi
          gh issue comment "$ISSUE_NO" --body "Passed the editorial policy check — sign-off PR: $PR_URL"
