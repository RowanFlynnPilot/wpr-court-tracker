name: Track-a-case intake

# Two lanes, one policy gate (pipeline/issue_case.py):
#
#   1. INSTANT FEEDBACK - every "track-a-case" issue is validated the
#      moment it's opened or edited. Failures get a fix-it comment.
#   2. PUBLISHING - depends on who filed it:
#        - Newsroom (repo owner/members/collaborators): queued, then
#          published automatically by the twice-daily sweep below.
#          Closing the issue before the sweep cancels it.
#        - Anyone else: a sign-off pull request a human must merge.
#          Auto-publish is NEVER extended to outside submissions - this
#          is a public repo and the issue form is open to the internet.
#
# Issue bodies are untrusted: passed via env/stdin, never
# shell-interpolated, validated before anything is staged.

on:
  issues:
    types: [opened, edited]
  schedule:
    # Publish sweeps at 7:45 a.m. and 3:45 p.m. Central (CDT = UTC-5),
    # daily. GITHUB_TOKEN pushes never trigger on:push workflows
    # (GitHub anti-recursion), so the sweep dispatches the deploy itself.
    - cron: '45 12,20 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write

concurrency:
  group: track-case-intake
  cancel-in-progress: false

jobs:
  feedback:
    if: >-
      github.event_name == 'issues' &&
      contains(github.event.issue.labels.*.name, 'track-a-case')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build and validate the case entry
        id: parse
        continue-on-error: true
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python pipeline/issue_case.py 2> err.txt

      - name: Explain a rejected form on the issue
        if: steps.parse.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NO: ${{ github.event.issue.number }}
        run: |
          {
            echo "This request can't go on the tracker yet:"
            echo
            echo '```'
            cat err.txt
            echo '```'
            echo
            echo "Edit this issue's description to fix it — it re-checks automatically."
          } > comment.md
          gh issue comment "$ISSUE_NO" --body-file comment.md
          exit 1

      - name: Queue a newsroom submission for the next publish sweep
        if: >-
          steps.parse.outcome == 'success' &&
          contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association)
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NO: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE_NO" --body "Passed the editorial policy check ✔ Queued as a newsroom submission — it publishes automatically at the next sweep (7:45 a.m. or 3:45 p.m. Central). Close this issue before then to cancel, or run the 'Track-a-case intake' workflow from the Actions tab to publish now."

      - name: Open a sign-off PR for outside submissions
        if: >-
          steps.parse.outcome == 'success' &&
          !contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association)
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NO: ${{ github.event.issue.number }}
        run: |
          CASE_NO=$(python -c "import json; print(json.load(open('out/new_case.json'))['caseNo'])")
          HEADLINE=$(python -c "import json; print(json.load(open('out/new_case.json'))['headline'])")
          MODE=$(python -c "import json; print(json.load(open('out/new_case.json')).get('intakeMode','new'))")
          [ "$MODE" = "update" ] && VERB="Update" || VERB="Track"
          BRANCH="case/issue-$ISSUE_NO"
          git config user.name "wpr-court-tracker"
          git config user.email "actions@github.com"
          git checkout -b "$BRANCH"
          git add config/cases.json
          git commit -m "$VERB $CASE_NO: $HEADLINE" -m "From track-a-case issue #$ISSUE_NO."
          git push -f origin "HEAD:$BRANCH"
          printf '%s\n' \
            "Watchlist change from issue #$ISSUE_NO ($MODE)." \
            "" \
            "Passed the editorial policy gate. **Merging is the publisher sign-off** — it publishes within minutes." \
            "" \
            "Closes #$ISSUE_NO" > pr-body.md
          PR_URL=$(gh pr list --head "$BRANCH" --json url --jq '.[0].url')
          if [ -z "$PR_URL" ]; then
            PR_URL=$(gh pr create --head "$BRANCH" \
              --title "$VERB $CASE_NO: $HEADLINE" --body-file pr-body.md)
          fi
          gh issue comment "$ISSUE_NO" --body "Passed the editorial policy check — sign-off PR: $PR_URL"

  publish:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Publish queued newsroom cases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail
          git config user.name "wpr-court-tracker"
          git config user.email "actions@github.com"
          PUBLISHED=0
          FAILED=0
          for N in $(gh api "repos/$GITHUB_REPOSITORY/issues?labels=track-a-case&state=open&per_page=100" \
                       --jq '.[] | select(.pull_request == null) | .number'); do
            ASSOC=$(gh api "repos/$GITHUB_REPOSITORY/issues/$N" --jq .author_association)
            case "$ASSOC" in
              OWNER|MEMBER|COLLABORATOR) ;;
              *) echo "skip #$N ($ASSOC) - stays on the PR review path"; continue ;;
            esac
            if [ -n "$(gh pr list --head "case/issue-$N" --json number --jq '.[0].number')" ]; then
              echo "skip #$N - a sign-off PR already exists"
              continue
            fi
            gh issue view "$N" --json body --jq .body > body.txt
            if python pipeline/issue_case.py < body.txt 2> err.txt; then
              CASE_NO=$(python -c "import json; print(json.load(open('out/new_case.json'))['caseNo'])")
              HEADLINE=$(python -c "import json; print(json.load(open('out/new_case.json'))['headline'])")
              CASE_ID=$(python -c "import json; print(json.load(open('out/new_case.json'))['id'])")
              MODE=$(python -c "import json; print(json.load(open('out/new_case.json')).get('intakeMode','new'))")
              [ "$MODE" = "update" ] && VERB="Update" || VERB="Track"
              git add config/cases.json
              git commit -m "$VERB $CASE_NO: $HEADLINE" -m "Published from track-a-case issue #$N (newsroom submission)."
              gh issue comment "$N" --body "Published — live with the next deploy (minutes): https://rowanflynnpilot.github.io/wpr-court-tracker/#$CASE_ID"
              gh issue close "$N"
              PUBLISHED=$((PUBLISHED+1))
            else
              FAILED=$((FAILED+1))
              {
                echo "The publish sweep couldn't add this case:"
                echo
                echo '```'
                cat err.txt
                echo '```'
                echo
                echo "Edit the issue description to fix it — the next sweep retries automatically."
              } > comment.md
              gh issue comment "$N" --body-file comment.md
            fi
          done
          if [ "$PUBLISHED" -gt 0 ]; then
            git pull --rebase origin main
            git push
            # The token push above can't trigger on:push - deploy explicitly
            # so "live in minutes" (the issue comment's promise) stays true.
            gh workflow run "Update court data and deploy"
          fi
          echo "published $PUBLISHED case(s), $FAILED needing fixes"
