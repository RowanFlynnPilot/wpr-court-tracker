name: Update court data and deploy

on:
  schedule:
    # Every 2 hours, 8 a.m.-6 p.m. Central (CDT = UTC-5), weekdays only.
    # Courts don't docket overnight; don't poll overnight.
    - cron: '0 13,15,17,19,21,23 * * 1-5'
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      attempt:
        description: 'WCCA fetch attempt (the workflow hands itself off to a fresh runner on failure; max 3)'
        required: false
        default: '1'

permissions:
  contents: write
  pages: write
  id-token: write
  actions: write
  issues: write

concurrency:
  group: court-tracker
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      # '1' for schedule/push; self-handoff dispatches 2 then 3.
      ATTEMPT: ${{ inputs.attempt || '1' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run pipeline tests
        run: python tests/test_pipeline.py

      # continue-on-error so a WCCA stall can't block deploying - the site
      # ships with the last committed (still-valid) data. WCCA slows for
      # datacenter IPs in predictable windows (~1 p.m. and ~7 p.m. Central,
      # observed daily); a fresh runner minutes later usually gets through,
      # so failures hand off to a new runner (new IP) up to 3 attempts,
      # and only a 3-runner miss raises the wcca-outage issue. Runs stay
      # green: red is reserved for real bugs (tests, build, deploy).
      - name: Fetch court activity (official WCCA RSS)
        id: fetch
        continue-on-error: true
        run: python pipeline/fetch.py

      - name: Hand off to a fresh runner (WCCA stalled on this one)
        if: steps.fetch.outcome == 'failure' && (env.ATTEMPT == '1' || env.ATTEMPT == '2')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NEXT=$((ATTEMPT + 1))
          echo "::warning::WCCA fetch stalled (runner attempt $ATTEMPT of 3). Dispatching attempt $NEXT on a fresh runner; this run still deploys last-good data."
          gh workflow run "Update court data and deploy" -f attempt="$NEXT"

      - name: Raise the outage flag (three runners couldn't reach WCCA)
        if: steps.fetch.outcome == 'failure' && env.ATTEMPT == '3'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "::warning::WCCA unreachable after 3 fresh-runner attempts. Site serves last-good data; the widget's checked-at time stays honest."
          gh label create wcca-outage --color B60205 --description "WCCA unreachable from Actions runners" 2>/dev/null || true
          N=$(gh issue list --label wcca-outage --state open --json number --jq '.[0].number')
          if [ -z "$N" ]; then
            gh issue create --label wcca-outage \
              --title "WCCA unreachable from Actions runners" \
              --body "Court-record checks are timing out from GitHub's runners (three fresh runners tried per tick). The site keeps deploying with last-good data and the widget shows the honest checked-at time. This issue closes automatically on the first successful check. Playbook: CLAUDE.md operational notes."
          else
            gh issue comment "$N" --body "Still unreachable at $(date -u '+%F %T') UTC (3 fresh-runner attempts)."
          fi

      - name: Clear the outage flag
        if: steps.fetch.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          N=$(gh issue list --label wcca-outage --state open --json number --jq '.[0].number')
          if [ -n "$N" ]; then
            gh issue close "$N" --comment "Recovered - court-record checks are succeeding again."
          fi

      - name: Commit data changes
        run: |
          if ! git diff --quiet data/; then
            git config user.name "wpr-court-tracker"
            git config user.email "actions@github.com"
            git add data/
            SUMMARY=$(python -c "import json; c=json.load(open('data/changes.json'))['changed']; print('Court data: ' + (', '.join(x['caseNo'] for x in c) if c else 'refresh'))")
            git commit -m "$SUMMARY"
            git push
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: widget/package-lock.json

      - name: Build widget
        working-directory: widget
        run: |
          npm ci
          node scripts/test-parse.mjs
          npm run build

      # Same pattern as wpr-brewers-tracker: email clients strip iframes
      # and social networks want a fixed og:image, so pre-render both
      # cards to PNGs served from the Pages root. Not committed -
      # rebuilt fresh on every deploy.
      - name: Render newsletter digest + social card images
        working-directory: widget
        run: |
          npx playwright install --with-deps chromium
          npm run preview -- --port 4173 --host 127.0.0.1 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:4173/mini-digest.html > /dev/null && break
            sleep 1
          done
          node scripts/render-cards.mjs http://127.0.0.1:4173 dist

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: widget/dist

      - id: deployment
        uses: actions/deploy-pages@v4
