name: Update court data and deploy

on:
  schedule:
    # Every 2 hours, 8 a.m.-6 p.m. Central (CDT = UTC-5), weekdays only.
    # Courts don't docket overnight; don't poll overnight.
    - cron: '0 13,15,17,19,21,23 * * 1-5'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: court-tracker
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run pipeline tests
        run: python tests/test_pipeline.py

      # continue-on-error so a WCCA outage can't block deploying widget
      # changes - the site ships with the last committed (still-valid)
      # data. The run is still marked failed at the end: loud, not silent.
      - name: Fetch court activity (official WCCA RSS)
        id: fetch
        continue-on-error: true
        run: python pipeline/fetch.py

      - name: Commit data changes
        run: |
          if ! git diff --quiet data/; then
            git config user.name "wpr-court-tracker"
            git config user.email "actions@github.com"
            git add data/
            SUMMARY=$(python -c "import json; c=json.load(open('data/changes.json'))['changed']; print('Court data: ' + (', '.join(x['caseNo'] for x in c) if c else 'refresh'))")
            git commit -m "$SUMMARY"
            git push
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: widget/package-lock.json

      - name: Build widget
        working-directory: widget
        run: |
          npm ci
          node scripts/test-parse.mjs
          npm run build

      # Same pattern as wpr-brewers-tracker: email clients strip iframes
      # and social networks want a fixed og:image, so pre-render both
      # cards to PNGs served from the Pages root. Not committed -
      # rebuilt fresh on every deploy.
      - name: Render newsletter digest + social card images
        working-directory: widget
        run: |
          npx playwright install --with-deps chromium
          npm run preview -- --port 4173 --host 127.0.0.1 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:4173/mini-digest.html > /dev/null && break
            sleep 1
          done
          node scripts/render-cards.mjs http://127.0.0.1:4173 dist

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: widget/dist

      - id: deployment
        uses: actions/deploy-pages@v4

      - name: Propagate fetch failure (deploy happened; stay loud)
        if: steps.fetch.outcome == 'failure'
        run: |
          echo "WCCA fetch failed this run; site deployed with last-good data." >&2
          exit 1
