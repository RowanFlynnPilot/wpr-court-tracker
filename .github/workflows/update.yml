name: Update court data and deploy

on:
  schedule:
    # Every 2 hours, 8 a.m.-6 p.m. Central (CDT = UTC-5), weekdays only.
    # Courts don't docket overnight; don't poll overnight.
    - cron: '0 13,15,17,19,21,23 * * 1-5'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: court-tracker
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run pipeline tests
        run: python tests/test_pipeline.py

      - name: Fetch court activity (official WCCA RSS)
        run: python pipeline/fetch.py

      - name: Commit data changes
        run: |
          if ! git diff --quiet data/; then
            git config user.name "wpr-court-tracker"
            git config user.email "actions@github.com"
            git add data/
            SUMMARY=$(python -c "import json; c=json.load(open('data/changes.json'))['changed']; print('Court data: ' + (', '.join(x['caseNo'] for x in c) if c else 'refresh'))")
            git commit -m "$SUMMARY"
            git push
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: widget/package-lock.json

      - name: Build widget
        working-directory: widget
        run: |
          npm ci
          npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: widget/dist

      - id: deployment
        uses: actions/deploy-pages@v4
